<meta charset="UTF-8">

<script>

	function pulaLinha(){

		document.write("<br><br>")

	}

	function mostra(frase){
		document.write(frase);
		pulaLinha();
	}

var minhaIdade = 20;
var idadeIrmao = 15;
var diferençaIdade = minhaIdade - idadeIrmao;

mostra("A minha idade é: " + minhaIdade);
mostra("A idade do meu irmão é: " + idadeIrmao);
mostra("A nossa diferença é de " + diferençaIdade + " anos.");

</script>
