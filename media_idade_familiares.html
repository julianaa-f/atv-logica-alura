<meta charset= "UTF-8">

<script>

function pulaLinha(){

	document.write("<br><br>")
	document.write("<br><br>")

}

function mostra(frase){
	document.write(frase);
	pulaLinha();
}

var totalFamiliares = parseInt(prompt("Qual a quantidade de pessoas na sua família?"));

numero = 1;

var totalIdades = 0;

while(numero <= totalFamiliares){

	var idade = parseInt(prompt("Qual a idade dos seus familiares?"));
	totalIdades = totalIdades + idade;
	numero++;

}

var media = totalIdades / totalFamiliares;

mostra("A média das idades é " + Math.round(media));

mostra("FIM");

</script>
